services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: glowai
      POSTGRES_PASSWORD: glowai_dev
      POSTGRES_DB: glowai
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glowai"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://glowai:glowai_dev@db:5432/glowai
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
